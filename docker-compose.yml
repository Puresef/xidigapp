# Local-only infrastructure for development. Not used in CI or production —
# hosted Meilisearch (or any provider) is configured via MEILISEARCH_HOST /
# MEILISEARCH_API_KEY in .env, same as every other external service.
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v   (wipes the local search index)
services:
  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY in .env (see .env.example)}
      MEILI_NO_ANALYTICS: 'true'
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data

volumes:
  meilisearch_data:
