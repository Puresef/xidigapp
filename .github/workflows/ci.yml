name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # Version comes from the "packageManager" field in package.json.
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: 'true'

      # Front-door delivery budgets (docs/front-door-standard.md §2-E30 +
      # §2-B11): compressed-weight ratchet, eager-image governance, and the
      # warm-second-request TTFB tripwire, all against a real production
      # server. The Supabase values are unroutable placeholders — every read
      # degrades down the resilience ladder (counter/event card silently
      # absent), which is exactly the payload shape the budget governs.
      - name: Front-door weight + warm-TTFB budget
        env:
          SUPABASE_URL: 'http://127.0.0.1:54321'
          SUPABASE_PUBLISHABLE_KEY: 'ci-placeholder'
          SUPABASE_SECRET_KEY: 'ci-placeholder'
          NEXT_PUBLIC_SUPABASE_URL: 'http://127.0.0.1:54321'
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: 'ci-placeholder'
        run: |
          pnpm --filter @xidig/web start &
          SERVER_PID=$!
          for i in $(seq 1 60); do
            curl -sf -o /dev/null http://localhost:3000/ && break
            sleep 1
          done
          node apps/web/scripts/front-door-weight.mjs http://localhost:3000 || STATUS=$?
          kill "$SERVER_PID" || true
          exit "${STATUS:-0}"
